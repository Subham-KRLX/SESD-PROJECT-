services:
  - type: web
    name: techspark
    env: node
    plan: free
    buildCommand: npm ci && npm run build && npx prisma migrate deploy && npm run seed
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.19.0
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false