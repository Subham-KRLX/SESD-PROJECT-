services:
  - type: web
    name: techspark
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false